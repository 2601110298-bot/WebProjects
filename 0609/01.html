<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 이벤트 모델</title>
    <script>
        function green() {
            alert('안녕하세요~ 인라인 이벤트 모델 2');
        }

        function addStar(btn) {
            btn.textContent += '★';
        }

        function overChange(btn) {
            btn.style.backgroundColor = 'magenta';
            btn.style.color = 'white';
        }

        function outChange(btn) {
            btn.style.backgroundColor = 'lightgray';
            btn.style.color = 'black';
        }

        let count = 1;
        function changeImg(img) {
            count++;
            if(count > 5)
            count = 1;
         img.src = "imgs/animal" + count + ".jpg";
        }

        function showImageSlide() {
            let img = document.getElementById('img2');
            let count = 1;
            setInterval(function() {
                count++;
            if(count > 5) 
            count = 1;
            
            img.src = "imgs/animal" + count + ".jpg";
            }, 2000);
        }
    </script>
</head>
<body onload="showImageSlide()">
    <button onclick="alert('인라인 이벤트 모델')">인라인 이벤트 모델</button><br><br>
    <button onclick="green()">인라인 이벤트 모델 2</button><br><br>
    <button onclick="addStar(this)">별 추가</button><br><br>
    <button onmouseover="overChange(this)" onmouseout="outChange(this)">배경 및 글자색 변경</button>
    <img src="imgs/animal.jpg" width="400" height="300" onclick="changeImg(this)" style="cursor:pointer;">
    <img src="imgs/animal.jpg" width="400" height="300" id="img2">
</body>
</html>
