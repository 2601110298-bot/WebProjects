<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>돈 관리</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:40px;
}

.container{
    width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.summary{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.money{
    font-size:25px;
    font-weight:bold;
}

.transactions{
    margin-top:40px;
}

.item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

.income{
    color:green;
}

.expense{
    color:red;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.chart-box{
    margin-top:50px;
    border:1px solid #ccc;
    padding:20px;
}

.chart{
    width:300px;
    height:300px;
    border-radius:50%;
    margin:auto;
    background:
    conic-gradient(
        green 0deg,
        green 360deg,
        red 360deg
    );
}

.labels{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
    font-size:20px;
}

.green{
    color:green;
}

.red{
    color:red;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<h1>돈 관리</h1>

<button onclick="addData()">+추가</button>

</div>

<div class="summary">

<div>
<p>총 수입</p>
<div class="money" id="income">₩0</div>
</div>

<div>
<p>지출</p>
<div class="money" id="expense">₩0</div>
</div>

<div>
<p>잔액</p>
<div class="money" id="balance">₩0</div>
</div>

</div>

<div class="transactions">

<h2>거래 내역</h2>

<div id="list"></div>

</div>

<div class="chart-box">

<h2>지출 카테고리</h2>

<div class="chart" id="chart"></div>

<div class="labels">
<span class="green">■ 수입</span>
<span class="red">■ 지출</span>
</div>

</div>

</div>

<script>

let income = 0;
let expense = 0;

function update(){

    document.getElementById('income').innerText =
    "₩" + income.toLocaleString();

    document.getElementById('expense').innerText =
    "₩" + expense.toLocaleString();

    document.getElementById('balance').innerText =
    "₩" + (income - expense).toLocaleString();

    const total = income + expense;

    let incomePercent = 100;

    if(total > 0){
        incomePercent = (income / total) * 360;
    }

    document.getElementById('chart').style.background =
    `conic-gradient(
        green 0deg,
        green ${incomePercent}deg,
        red ${incomePercent}deg,
        red 360deg
    )`;
}

function addData(){

    const name = prompt("이름 입력");

    const type = prompt("수입 또는 지출 입력");

    const money = Number(prompt("금액 입력"));

    if(!name || isNaN(돈)) return;

    const item = document.createElement('div');

    item.className = "item";

    const title = document.createElement('span');
    title.innerText = name;

    const value = document.createElement('span');

    if(type == "수입"){

        income += money;

        value.innerText = "+₩" + money.toLocaleString();

        value.className = "income";

    }else{

        expense += money;

        value.innerText = "-₩" + money.toLocaleString();

        value.className = "expense";
    }

    item.appendChild(title);

    item.appendChild(value);

    document.getElementById('list').appendChild(item);

    update();
}

</script>

</body>
</html>
