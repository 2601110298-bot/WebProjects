<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보상형 할 일 관리</title>
      <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        let completedCount = 0;

function addTodo() {

    const input = document.getElementById("todoInput");
    const text = input.value.trim();

    if(text === ""){
        alert("할 일을 입력하세요!");
        return;
    }

    const li = document.createElement("li");

    const completeBtn = document.createElement("button");
    completeBtn.textContent = "완료";

    li.textContent = text + " ";

    li.appendChild(completeBtn);

    completeBtn.addEventListener("click", function(){

        if(!li.classList.contains("complete")){

            li.classList.add("complete");

            completedCount++;

            document.getElementById("count").textContent = completedCount;

            checkReward();
        }
    });

    document.getElementById("todoList").appendChild(li);

    input.value = "";
}

function checkReward(){

    const rewardBox = document.getElementById("rewardBox");

    if(completedCount === 1){
        rewardBox.innerHTML +=
        '<div class="reward">밥먹기</div>';
    }

    if(completedCount === 2){
        rewardBox.innerHTML +=
        '<div class="reward">30분 휴식</div>';
    }

    if(completedCount === 3){
        rewardBox.innerHTML +=
        '<div class="reward">자기</div>';
    }
}
</script>
<style>
    body{
    font-family: Arial;
    background:#f0f2f5;
    text-align:center;
}

.container{
    width:500px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
    cursor:pointer;
}

li{
    list-style:none;
    margin:10px;
    padding:10px;
    background:#eee;
    border-radius:5px;
}

.complete{
    background:#90ee90;
    text-decoration:line-through;
}

.reward{
    background:gold;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">
    <h1> 보상형 할 일 관리</h1>

    <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
    <button onclick="addTodo()">추가</button>

    <h2>할 일 목록</h2>
    <ul id="todoList"></ul>

    <h2>완료 개수 : <span id="count">0</span></h2>

    <h2>보상</h2>
    <div id="rewardBox">
        <p>아직 보상이 없습니다.</p>
    </div>
</div>
</body>
</html>
