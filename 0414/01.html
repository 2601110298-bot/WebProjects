<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태선택자</title>
    <!-- 상태 선택자 -->
    <style>
        input:enabled {
            background-color: rgb(26, 169, 26);
        }
        input:disabled {
            background-color: rgb(179, 9, 9);
        }
        input:focus {
            background-color: rgb(26, 26, 169);
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type="text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled><br><br>
</body>
</html>
